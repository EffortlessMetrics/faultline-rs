name: CI Full

on:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - run: cargo install cargo-insta

      - name: "Contract: formatting"
        id: fmt
        run: cargo fmt --all --check

      - name: "Contract: lint"
        id: lint
        run: cargo clippy --workspace -- -D warnings

      - name: "Contract: tests pass"
        id: test
        run: cargo test --workspace

      - name: "Contract: golden snapshots are fresh"
        id: snapshots
        run: cargo insta test --check

      - name: "Contract: JSON schema is current"
        id: schema
        run: cargo xtask generate-schema && git diff --exit-code schemas/

      - name: "Contract: scenario atlas is consistent"
        id: scenarios
        run: cargo xtask check-scenarios

      - name: "Post contract summary"
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const contracts = [
              { name: 'formatting', status: '${{ steps.fmt.outcome }}' },
              { name: 'lint', status: '${{ steps.lint.outcome }}' },
              { name: 'tests', status: '${{ steps.test.outcome }}' },
              { name: 'golden snapshots', status: '${{ steps.snapshots.outcome }}' },
              { name: 'JSON schema', status: '${{ steps.schema.outcome }}' },
              { name: 'scenario atlas', status: '${{ steps.scenarios.outcome }}' },
            ];

            const icon = (s) => s === 'success' ? ':white_check_mark:' : s === 'failure' ? ':x:' : s === 'skipped' ? ':fast_forward:' : ':grey_question:';
            const rows = contracts.map(c => `| ${icon(c.status)} | ${c.name} | \`${c.status}\` |`).join('\n');
            const allPassed = contracts.every(c => c.status === 'success');
            const header = allPassed
              ? ':white_check_mark: **All contracts passed**'
              : ':x: **One or more contracts failed**';

            const body = [
              '## CI Full - Contract Summary',
              '',
              header,
              '',
              '| | Contract | Status |',
              '|---|----------|--------|',
              rows,
            ].join('\n');

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## CI Full - Contract Summary';
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
