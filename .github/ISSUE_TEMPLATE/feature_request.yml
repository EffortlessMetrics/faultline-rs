name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: false

  - type: checkboxes
    id: crates
    attributes:
      label: Crate(s) affected
      description: Which crate(s) would this change touch?
      options:
        - label: cli
        - label: types
        - label: localization
        - label: surface
        - label: render
        - label: git
        - label: store
        - label: probe-exec
        - label: sarif
        - label: junit
        - label: other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you have considered.
    validations:
      required: false
