name: Bug Report
description: Report a bug in faultline
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `faultline-cli ...`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: faultline version
      description: Output of `faultline-cli --version`.
      placeholder: "faultline-cli 0.1.0"
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: false

  - type: input
    id: git-version
    attributes:
      label: Git version
      description: Output of `git --version`.
      placeholder: "git version 2.43.0"
    validations:
      required: false

  - type: dropdown
    id: exit-code
    attributes:
      label: Exit code received
      description: The process exit code faultline returned.
      options:
        - "0 - FirstBad"
        - "1 - SuspectWindow"
        - "2 - Error"
        - "3 - Inconclusive"
        - "4 - InvalidInput"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log output or terminal output.
      render: shell
    validations:
      required: false
