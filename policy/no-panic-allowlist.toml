# Semantic no-panic allowlist for faultline-rs.
#
# Every panic-family call site in the workspace is either:
#   (a) burned down to a fallible alternative, or
#   (b) explicitly receipted by an entry in this file.
#
# `cargo xtask check-no-panic-family` is the blocking gate. It parses Rust
# sources, locates panic-family findings, and matches them against the
# entries below by (path, family, selector). `last_seen.line` is advisory
# only — it is *not* part of identity.
#
# Schema: see docs/NO_PANIC_POLICY.md.
#
# Initial baseline below was generated via `cargo xtask no-panic baseline`
# against the panic-family debt that existed at policy-stack adoption. Each
# entry receipts ALL panic-family findings of a single family in a single
# file. New files and new families in existing files are NOT covered: those
# fail the gate, by design. Burn down by replacing entries with sharper
# selectors or removing them when the underlying surface is fallible.

schema_version = "0.3"

[[allow]]
id = "panic-baseline-0001"
path = "crates/faultline-app/src/lib.rs"
family = "expect"
classification = "baseline"
owner = "unassigned"
explanation = "12 pre-policy expect call site(s) at policy adoption; burn down by Q3 2026."
expires = "2026-09-01"

[allow.selector]
kind = "baseline_glob"
