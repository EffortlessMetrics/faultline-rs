# Mutation testing configuration for cargo-mutants.
# Invoked via: cargo xtask mutants
# Which runs:  cargo mutants -- --lib
#
# This file provides additional configuration for cargo-mutants.
# Covers domain core, adapter, and export crates.

# Timeout multiplier for mutant test runs (relative to baseline).
timeout_multiplier = 2.0

# Examine domain core + adapter + export crates.
examine_re = [
    "faultline_localization::",
    "faultline_app::",
    "faultline_git::",
    "faultline_probe_exec::",
    "faultline_store::",
    "faultline_render::",
    "faultline_sarif::",
    "faultline_junit::",
    "faultline_surface::",
]
